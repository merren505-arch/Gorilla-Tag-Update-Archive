<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse, search, and copy downpatching commands for every Steam and Oculus build of Gorilla Tag.">
    <meta name="theme-color" content="#10b981">
    
    <title>Gorilla Tag Depot Archive</title>
    
    <!-- Tailwind Engine -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/js/app/tailwind-config.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body class="min-h-screen bg-[#07070a] text-gray-300 p-4 sm:p-8 flex flex-col items-center antialiased select-none selection:bg-emerald-500/30 selection:text-emerald-200">

    <!-- Global Layout Wrapper -->
    <header class="w-full max-w-5xl mx-auto space-y-6 relative z-50 mb-6" role="banner">
        <div class="header-card bg-gray-900/40 backdrop-blur-xl border border-white/5 p-6 sm:p-8 rounded-3xl shadow-2xl shadow-black/80">
            
            <div class="flex flex-col lg:flex-row gap-6 justify-between items-start lg:items-center">
                <!-- Branding Header -->
                <div>
                    <h1 class="text-3xl font-extrabold tracking-tight flex items-center gap-3">
                        <span class="w-2.5 h-8 bg-gradient-to-b from-emerald-400 to-emerald-600 rounded-full shadow-[0_0_20px_rgba(16,185,129,0.5)]" aria-hidden="true"></span>
                        <span class="bg-clip-text text-transparent bg-gradient-to-r from-white via-gray-200 to-gray-500">Gorilla Tag Archive</span>
                    </h1>
                    <p class="text-sm text-gray-500 mt-2 pl-5 flex items-center gap-2 font-medium">
                        <span id="total-updates-count" class="text-emerald-400 font-bold">0</span> builds indexed
                        <span class="w-1.5 h-1.5 rounded-full bg-gray-800"></span>
                        <span id="year-range" class="opacity-70 text-gray-400 font-semibold">...</span>
                    </p>
                </div>

                <!-- Segmented Control Platform Toggles -->
                <nav class="flex bg-black/60 p-1.5 rounded-2xl border border-white/5 shadow-inner w-full lg:w-auto overflow-hidden" aria-label="Platform select">
                    <button id="platform-steam" onclick="setPlatform('steam')" 
                        class="platform-btn flex-1 sm:flex-none flex items-center justify-center gap-2 px-5 py-3 rounded-xl text-xs font-bold transition-all uppercase tracking-wider relative z-10">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12c0 5.52 4.48 10 10 10 5.52 0 10-4.48 10-10C22 6.48 17.52 2 12 2zm4.64 14.08c-.68 0-1.22-.54-1.22-1.22 0-.68.54-1.22 1.22-1.22.68 0 1.22.54 1.22 1.22 0 .68-.54 1.22-1.22 1.22zm-4.64-2.84c-1.74 0-3.16 1.42-3.16 3.16 0 1.74 1.42 3.16 3.16 3.16 1.74 0 3.16-1.42 3.16-3.16 0-1.74-1.42-3.16-3.16-3.16zm-4.22-2.1c-.86 0-1.56.7-1.56 1.56 0 .86.7 1.56 1.56 1.56.86 0 1.56-.7 1.56-1.56 0-.86-.7-1.56-1.56-1.56zm10.74-3.52l-2.4 3.48c-.68-.26-1.42-.4-2.18-.4-3.3 0-5.98 2.68-5.98 5.98 0 .52.08 1.02.2 1.5l-3.24 1.42c-.54.24-1.18.06-1.52-.44-.34-.5-.26-1.16.2-1.56l3.66-3.1c-.04-.26-.06-.52-.06-.8 0-2.88 2.34-5.22 5.22-5.22.84 0 1.62.2 2.32.54l2.42-3.52c.3-.44.92-.6 1.42-.38.5.22.74.82.52 1.32l-1.08 2.6z"/></svg>
                        Steam
                    </button>
                    <button id="platform-oculus-pc" onclick="setPlatform('oculus-pc')" 
                        class="platform-btn flex-1 sm:flex-none flex items-center justify-center gap-2 px-5 py-3 rounded-xl text-xs font-bold transition-all uppercase tracking-wider relative z-10">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12c0 5.52 4.48 10 10 10 5.52 0 10-4.48 10-10C22 6.48 17.52 2 12 2zm-3.5 13.5c-1.93 0-3.5-1.57-3.5-3.5S6.57 8.5 8.5 8.5 12 10.07 12 12s-1.57 3.5-3.5 3.5zm7 0c-1.93 0-3.5-1.57-3.5-3.5S13.57 8.5 15.5 8.5 19 10.07 19 12s-1.57 3.5-3.5 3.5z"/></svg>
                        Oculus PC
                    </button>
                    <button id="platform-oculus-quest" onclick="setPlatform('oculus-quest')" 
                        class="platform-btn flex-1 sm:flex-none flex items-center justify-center gap-2 px-5 py-3 rounded-xl text-xs font-bold transition-all uppercase tracking-wider relative z-10">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
                        Quest APK
                    </button>
                </nav>
            </div>

            <!-- Interactivity Segment -->
            <div class="flex flex-col sm:flex-row gap-4 mt-6 justify-between items-center border-t border-white/5 pt-6">
                <div class="flex flex-wrap gap-2 w-full sm:w-auto">
                    <button id="branch-btn" onclick="toggleBranch()" aria-label="Cycle branch filter"
                        class="flex-1 sm:flex-none px-4 py-3 bg-black/40 border border-white/5 rounded-2xl text-xs font-bold text-gray-400 hover:text-white hover:border-white/20 transition-all uppercase tracking-widest">
                         <span class="flex items-center justify-center gap-2.5">
                             <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>
                            <span id="branch-btn-text">All Branches</span>
                        </span>
                    </button>
                </div>

                <!-- Input box -->
                <div class="w-full sm:w-80 relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="h-4 w-4 text-gray-500 group-focus-within:text-emerald-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <input type="text" id="search-input" placeholder="Search title, build, date..." aria-label="Search builds"
                        class="w-full pl-11 pr-10 py-3 bg-black/50 border border-white/5 rounded-2xl text-sm text-gray-200 placeholder-gray-600 focus:ring-2 focus:ring-emerald-500/40 focus:border-emerald-500 outline-none transition-all shadow-inner">
                </div>
            </div>

            <!-- Years Selector Element -->
            <nav class="flex flex-wrap gap-2 mt-6 pt-4 border-t border-white/5" id="year-tabs-container" role="tablist" aria-label="Filter by year">
                <!-- Javascript Injection Spot -->
            </nav>
        </div>
    </header>

    <!-- Content Display Arena -->
    <main class="w-full max-w-5xl mx-auto mt-2 flex-grow relative" role="main">
        <div id="update-list-container" class="space-y-4" aria-live="polite">
            <!-- Dynamic update cards generated in app.js -->
        </div>
    </main>

    <!-- Toast Modal -->
    <div id="toast" role="status" aria-live="polite"
        class="fixed bottom-8 left-1/2 transform -translate-x-1/2 translate-y-24 opacity-0 transition-all duration-300 ease-out z-[100] bg-[#111115]/95 border border-emerald-500/50 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center space-x-3.5 font-medium backdrop-blur-md">
        <div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center text-emerald-400 border border-emerald-500/30">
            <svg class="w-4.5 h-4.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <span id="toast-message" class="text-sm tracking-wide">Copied to clipboard</span>
    </div>

    <!-- Scroll Back to Top Button -->
    <button id="back-to-top" onclick="scrollToTop()" aria-label="Scroll to top"
        class="fixed bottom-8 right-8 z-50 w-14 h-14 bg-emerald-600/90 backdrop-blur-md border border-emerald-400/50 rounded-2xl text-white hover:bg-emerald-500 shadow-[0_0_20px_rgba(16,185,129,0.3)] transition-all duration-300 opacity-0 translate-y-6 pointer-events-none flex items-center justify-center">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7"></path></svg>
    </button>

    <!-- Footer Component -->
    <footer class="w-full max-w-5xl mx-auto py-10 mt-12 text-center text-gray-600 text-xs border-t border-white/5" role="contentinfo">
        <p class="font-medium text-gray-500">Gorilla Tag Depot Archive — Live API version</p>
        <p class="mt-1">Build index verified chronologically &bull; Steam commands support both Manifest IDs and Build IDs</p>
    </footer>

    <!-- App Scripts -->
    <script src="assets/js/data/updates-data.js"></script>
    <script src="assets/js/data/oculus-pc-data.js"></script>
    <script src="assets/js/data/oculus-quest-data.js"></script>
    <script src="assets/js/app/main.js"></script>
</body>
</html>
